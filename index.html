<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 50px 20px; background: #ffffff; color: #333; }
        .card { background: #f9f9f9; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .btn { background: #007AFF; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .btn-delay { background: #5856D6; } /* Different color for the delay button */
        .money { font-size: 48px; margin: 20px 0; }
        #status { color: #8e8e93; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="money">💰</div>
        <h1>Sales Notifier</h1>
        
        <button class="btn" onclick="enableNotifications()">1. Enable Notifications</button>
        
        <button class="btn btn-delay" onclick="startDelayedSale()">2. Send Sale in 5 Mins</button>
        
        <div id="status">Status: Ready</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function enableNotifications() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('status').innerText = "Status: Notifications Allowed ✅";
                    // Immediate test
                    setTimeout(sendFakeSale, 2000);
                }
            });
        }

        function startDelayedSale() {
            if (Notification.permission !== "granted") {
                alert("Please enable notifications first!");
                return;
            }

            let secondsLeft = 300;
            document.getElementById('status').innerText = `Status: Sending in ${secondsLeft}s...`;

            // Update the countdown every second
            const timer = setInterval(() => {
                secondsLeft--;
                document.getElementById('status').innerText = `Status: Sending in ${secondsLeft}s...`;
                if (secondsLeft <= 0) clearInterval(timer);
            }, 1000);

            // Set the actual timeout for 300 seconds
            setTimeout(() => {
                sendFakeSale();
                document.getElementById('status').innerText = "Status: Sale Sent! 💰";
            }, 300000); 
        }

        function sendFakeSale() {
            const randomVal = Math.floor(Math.random() * (100 - 2 + 1) + 2);
            const amount = (randomVal / 2).toFixed(2);
            
            const options = {
                body: `New Sale: $${amount} NZD 💰`,
                icon: 'https://cdn-icons-png.flaticon.com/512/639/639365.png',
                badge: 'https://cdn-icons-png.flaticon.com/512/639/639365.png'
            };
            
            new Notification("You made a sale!", options);
        }
    </script>
</body>
</html>
